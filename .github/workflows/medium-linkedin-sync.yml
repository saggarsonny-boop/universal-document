name: Autonomous LinkedIn Publisher

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  publish-to-linkedin:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios
        working-directory: ./scripts

      - name: Run Publisher Script
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: node scripts/linkedin-publisher.js

      - name: Commit state update
        run: |
          git config --global user.name 'HiveOps Automaton'
          git config --global user.email 'automaton@hive.baby'
          git add scripts/last_posted_url.txt
          # Only commit if the file has changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last posted LinkedIn url [skip ci]" && git push)
